<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kubernetes App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 50px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      color: white;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    p {
      color: #f1f5f9;
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #facc15;
      color: #111827;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      transform: scale(1.05);
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
      100% {
        transform: translateY(0px);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 ArgoCD Fully Automated</h1>

    <p>
      Welcome <span class="highlight">Vijay Team India</span>
    </p>

    <p>
      Kubernetes + DevOps + CI/CD Pipeline Successfully Running
    </p>

    <button class="btn">Deployment Successful ✅</button>
  </div>

</body>
</html>
