apiVersion: apps/v1
kind: Deployment

metadata:
  name: html-deployment
  namespace: html-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: html-app

  template:
    metadata:
      labels:
        app: html-app

    spec:
      containers:
      - name: html-container
        image: html-app
        imagePullPolicy: Never

        ports:
        - containerPort: 80
